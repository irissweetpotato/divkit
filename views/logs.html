<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DivKit Admin — Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }
    header {
      background: #1c1f26;
      border-bottom: 1px solid #2d3139;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 24px;
    }
    header .logo { font-size: 16px; font-weight: 600; color: #fff; }
    header nav { display: flex; gap: 16px; margin-left: auto; }
    header nav a {
      color: #8b949e;
      text-decoration: none;
      font-size: 14px;
      padding: 4px 0;
    }
    header nav a:hover { color: #58a6ff; }
    header nav a.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 24px; }

    h2 { font-size: 20px; color: #fff; margin-bottom: 16px; }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
    }
    .filter-group select,
    .filter-group input {
      padding: 7px 10px;
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 13px;
      outline: none;
    }
    .filter-group select:focus,
    .filter-group input:focus { border-color: #58a6ff; }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #fff;
      background: #1f6feb;
    }
    .btn:hover { background: #388bfd; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #161b22;
      border-bottom: 1px solid #2d3139;
    }
    td {
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid #2d3139;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }

    .session-row { cursor: pointer; }
    .session-row:hover { background: #21262d; }
    .session-row.has-error { background: #2a1515; }
    .session-row.has-error:hover { background: #3d1f1f; }

    .expand-icon {
      display: inline-block;
      width: 16px;
      transition: transform 0.2s;
      color: #8b949e;
    }
    .expand-icon.open { transform: rotate(90deg); }

    .steps-row { display: none; }
    .steps-row.open { display: table-row; }
    .steps-cell {
      padding: 0 14px 14px 40px;
      background: #161b22;
    }

    .step-list { list-style: none; }
    .step-item {
      padding: 8px 12px;
      border-left: 3px solid #2d3139;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .step-item.has-error { border-left-color: #f85149; background: #2a1515; border-radius: 0 6px 6px 0; }
    .step-name {
      font-size: 13px;
      font-weight: 500;
      min-width: 80px;
    }
    .step-time {
      font-size: 11px;
      color: #8b949e;
    }
    .step-error-icon {
      color: #f85149;
      cursor: help;
      font-size: 14px;
      position: relative;
    }
    .step-error-icon .tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1c1f26;
      border: 1px solid #6e3030;
      color: #f85149;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: pre-wrap;
      max-width: 400px;
      z-index: 100;
      margin-bottom: 6px;
      word-break: break-word;
    }
    .step-error-icon:hover .tooltip { display: block; }

    .step-details-btn {
      padding: 3px 8px;
      font-size: 11px;
      background: #21262d;
      border: 1px solid #2d3139;
      border-radius: 4px;
      color: #8b949e;
      cursor: pointer;
      margin-left: auto;
    }
    .step-details-btn:hover { color: #e1e4e8; border-color: #58a6ff; }

    .time-small {
      font-size: 11px;
      color: #8b949e;
      display: block;
    }
    .result-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .result-badge.clear { background: #1f6feb33; color: #58a6ff; }
    .result-badge.offer { background: #23863633; color: #3fb950; }
    .result-badge.error { background: #6e303033; color: #f85149; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }

    /* Details modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 12px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2d3139;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 16px; color: #fff; }
    .modal-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 20px;
      cursor: pointer;
    }
    .modal-close:hover { color: #fff; }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
    }
    .modal-body pre {
      background: #0f1117;
      padding: 14px;
      border-radius: 6px;
      font-size: 12px;
      color: #e1e4e8;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 60vh;
      overflow-y: auto;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">DivKit</span>
    <nav>
      <a href="/admin">Domains</a>
      <a href="/logs" class="active">Logs</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <div class="container">
    <h2>Logs</h2>

    <form class="filters" method="GET" action="/logs">
      <div class="filter-group">
        <label>Domain</label>
        <select name="domain">
          <option value="">All domains</option>
          {{DOMAIN_OPTIONS}}
        </select>
      </div>
      <div class="filter-group">
        <label>From</label>
        <input type="datetime-local" name="from" value="{{FILTER_FROM}}">
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="datetime-local" name="to" value="{{FILTER_TO}}">
      </div>
      <div class="filter-group">
        <label>Errors only</label>
        <select name="hasError">
          <option value=""{{FILTER_ERROR_ALL}}>All</option>
          <option value="1"{{FILTER_ERROR_YES}}>Errors only</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Order</label>
        <select name="order">
          <option value="desc"{{ORDER_DESC}}>Newest first</option>
          <option value="asc"{{ORDER_ASC}}>Oldest first</option>
        </select>
      </div>
      <button type="submit" class="btn">Filter</button>
    </form>

    {{CONTENT}}
  </div>

  <div class="modal-overlay" id="detailsModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Step Details</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <pre id="modalBody"></pre>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // Toggle session expand
    document.querySelectorAll('.session-row').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        const steps = document.getElementById('steps-' + id);
        const icon = row.querySelector('.expand-icon');
        if (steps) {
          steps.classList.toggle('open');
          icon.classList.toggle('open');
        }
      });
    });

    // Details modal
    function openDetails(stepName, detailsJson) {
      document.getElementById('modalTitle').textContent = stepName + ' — Details';
      try {
        const obj = JSON.parse(detailsJson);
        document.getElementById('modalBody').textContent = JSON.stringify(obj, null, 2);
      } catch {
        document.getElementById('modalBody').textContent = detailsJson;
      }
      document.getElementById('detailsModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('detailsModal').classList.remove('open');
    }

    document.getElementById('detailsModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Bind details buttons via data attributes
    document.querySelectorAll('.step-details-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const step = btn.dataset.step;
        const raw = atob(btn.dataset.details);
        openDetails(step, raw);
      });
    });
  </script>
</body>
</html>
