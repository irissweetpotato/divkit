<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DivKit Admin — Domains</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      min-height: 100vh;
    }
    header {
      background: #1c1f26;
      border-bottom: 1px solid #2d3139;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
      gap: 24px;
    }
    header .logo { font-size: 16px; font-weight: 600; color: #fff; }
    header nav { display: flex; gap: 16px; margin-left: auto; }
    header nav a {
      color: #8b949e;
      text-decoration: none;
      font-size: 14px;
      padding: 4px 0;
    }
    header nav a:hover { color: #58a6ff; }
    header nav a.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; }

    .container { max-width: 1100px; margin: 24px auto; padding: 0 24px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .top-bar h2 { font-size: 20px; color: #fff; }

    .add-form {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .add-form input {
      padding: 8px 12px;
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 13px;
      width: 240px;
      outline: none;
    }
    .add-form input:focus { border-color: #58a6ff; }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #fff;
    }
    .btn-green { background: #238636; }
    .btn-green:hover { background: #2ea043; }
    .btn-blue { background: #1f6feb; }
    .btn-blue:hover { background: #388bfd; }
    .btn-red { background: #6e3030; }
    .btn-red:hover { background: #8b3a3a; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: #161b22;
      border-bottom: 1px solid #2d3139;
    }
    td {
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid #2d3139;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr.domain-row { cursor: pointer; }
    tr.domain-row:hover { background: #21262d; }

    .expand-icon {
      display: inline-block;
      width: 16px;
      transition: transform 0.2s;
      color: #8b949e;
    }
    .expand-icon.open { transform: rotate(90deg); }

    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-cell { padding: 16px 24px; background: #161b22; }

    .slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 12px;
    }
    .slot-card {
      background: #1c1f26;
      border: 1px solid #2d3139;
      border-radius: 8px;
      padding: 16px;
    }
    .slot-card h4 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #fff;
    }
    .slot-status {
      font-size: 12px;
      margin-bottom: 10px;
      color: #8b949e;
    }
    .slot-status.has-json { color: #3fb950; }
    .slot-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .slot-actions input[type="file"] { display: none; }
    .slot-actions label {
      padding: 5px 10px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      background: #1f6feb;
      color: #fff;
    }
    .slot-actions label:hover { background: #388bfd; }

    .config-row {
      margin-bottom: 12px;
    }
    .config-row label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .config-row .inline {
      display: flex;
      gap: 6px;
    }
    .config-row input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      background: #0f1117;
      border: 1px solid #2d3139;
      border-radius: 6px;
      color: #e1e4e8;
      font-size: 13px;
      outline: none;
    }
    .config-row input[type="text"]:focus { border-color: #58a6ff; }

    .danger-zone {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #2d3139;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #8b949e;
      font-size: 14px;
    }

    /* Toast notifications */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      color: #fff;
      max-width: 380px;
      animation: slideIn 0.3s ease;
      word-break: break-word;
    }
    .toast.success { background: #238636; }
    .toast.error { background: #8b3a3a; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">DivKit</span>
    <nav>
      <a href="/admin" class="active">Domains</a>
      <a href="/logs">Logs</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <div class="container">
    <div class="top-bar">
      <h2>Domains</h2>
      <form class="add-form" method="POST" action="/admin/domains">
        <input type="text" name="domain" placeholder="new-domain.example.com" required>
        <button type="submit" class="btn btn-green">Add domain</button>
      </form>
    </div>

    {{CONTENT}}
  </div>

  <div id="toast-container"></div>

  <script>
    // Toggle domain expand
    document.querySelectorAll('.domain-row').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        const detail = document.getElementById('detail-' + id);
        const icon = row.querySelector('.expand-icon');
        if (detail) {
          detail.classList.toggle('open');
          icon.classList.toggle('open');
        }
      });
    });

    // Toast
    function showToast(msg, type) {
      const container = document.getElementById('toast-container');
      const el = document.createElement('div');
      el.className = 'toast ' + (type || 'success');
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => { el.remove(); }, 5000);
    }

    // Save backend URL
    document.querySelectorAll('.save-url-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const input = document.getElementById('url-' + id);
        try {
          const resp = await fetch('/admin/domains/' + id + '/url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: input.value })
          });
          const data = await resp.json();
          if (data.ok) showToast('Backend URL saved', 'success');
          else showToast(data.error || 'Failed to save URL', 'error');
        } catch (err) {
          showToast('Network error: ' + err.message, 'error');
        }
      });
    });

    // Save API key
    document.querySelectorAll('.save-key-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const input = document.getElementById('key-' + id);
        try {
          const resp = await fetch('/admin/domains/' + id + '/apikey', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: input.value })
          });
          const data = await resp.json();
          if (data.ok) showToast('API key saved', 'success');
          else showToast(data.error || 'Failed to save API key', 'error');
        } catch (err) {
          showToast('Network error: ' + err.message, 'error');
        }
      });
    });

    // Upload JSON
    document.querySelectorAll('.upload-json').forEach(input => {
      input.addEventListener('change', async (e) => {
        e.stopPropagation();
        const file = input.files[0];
        if (!file) return;
        const id = input.dataset.id;
        const slot = input.dataset.slot;
        const formData = new FormData();
        formData.append('file', file);
        try {
          const resp = await fetch('/admin/domains/' + id + '/json/' + slot, {
            method: 'POST',
            body: formData
          });
          const data = await resp.json();
          if (data.ok) {
            showToast(slot + ' JSON uploaded', 'success');
            setTimeout(() => location.reload(), 600);
          } else {
            showToast(data.error || 'Upload failed', 'error');
          }
        } catch (err) {
          showToast('Network error: ' + err.message, 'error');
        }
        input.value = '';
      });
    });

    // Delete JSON
    document.querySelectorAll('.delete-json-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const slot = btn.dataset.slot;
        if (!confirm('Delete ' + slot + ' JSON?')) return;
        try {
          const resp = await fetch('/admin/domains/' + id + '/json/' + slot, {
            method: 'DELETE'
          });
          const data = await resp.json();
          if (data.ok) {
            showToast(slot + ' JSON deleted', 'success');
            setTimeout(() => location.reload(), 600);
          } else {
            showToast(data.error || 'Delete failed', 'error');
          }
        } catch (err) {
          showToast('Network error: ' + err.message, 'error');
        }
      });
    });

    // Delete domain
    document.querySelectorAll('.delete-domain-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        if (!confirm('Delete domain "' + name + '"? This cannot be undone.')) return;
        try {
          const resp = await fetch('/admin/domains/' + id, { method: 'DELETE' });
          const data = await resp.json();
          if (data.ok) {
            showToast('Domain deleted', 'success');
            setTimeout(() => location.reload(), 600);
          } else {
            showToast(data.error || 'Delete failed', 'error');
          }
        } catch (err) {
          showToast('Network error: ' + err.message, 'error');
        }
      });
    });

    // Prevent expand toggle on clicks inside detail
    document.querySelectorAll('.detail-cell').forEach(cell => {
      cell.addEventListener('click', e => e.stopPropagation());
    });
  </script>
</body>
</html>
